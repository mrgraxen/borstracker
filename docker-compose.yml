services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-borstracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-borstracker}
      POSTGRES_DB: ${POSTGRES_DB:-borstracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-borstracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      target: api
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-borstracker}:${POSTGRES_PASSWORD:-borstracker}@postgres:5432/${POSTGRES_DB:-borstracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  price-fetcher:
    build:
      context: ./backend
      target: price-fetcher
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-borstracker}:${POSTGRES_PASSWORD:-borstracker}@postgres:5432/${POSTGRES_DB:-borstracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: deploy/caddy/Dockerfile
    ports:
      - "${HTTP_PORT:-8989}:80"
    env_file: .env
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8989}
    depends_on:
      - api
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
