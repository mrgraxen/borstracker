name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Download modules
        run: go mod download
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Alert engine coverage
        run: go test -coverprofile=alerts.out ./internal/alerts/... && go tool cover -func=alerts.out | tail -1
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          docker build -f backend/Dockerfile --target api ./backend
          docker build -f backend/Dockerfile --target price-fetcher ./backend
          docker build -f deploy/caddy/Dockerfile .
